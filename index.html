<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanishq Jain — Brand Strategist</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@300;400;500;600&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Space Grotesk",sans-serif;background:#f9f5ee;color:#1a1a1a;overflow-x:hidden;cursor:none}

.cursor-dot{position:fixed;width:10px;height:10px;background:#ff3c5f;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width 0.2s,height 0.2s,background 0.2s;mix-blend-mode:multiply}
.cursor-dot.hover{width:32px;height:32px;background:#ffde59}

:root{
  --yellow:#ffde59;--pink:#ff3c5f;--green:#00c37a;--blue:#3b5bff;
  --orange:#ff7a2f;--purple:#a855f7;--black:#1a1a1a;--white:#fefefe;
  --cream:#f9f5ee;--warm:#ede8df;--ink:#2b2b2b;
}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:52px;background:var(--black);color:var(--white)}
.nav-logo{font-family:"Archivo Black",sans-serif;font-size:17px;letter-spacing:-0.01em}
.nav-logo em{color:var(--yellow);font-style:normal}
.nav-links{display:flex;gap:1.5rem;list-style:none}
.nav-links a{font-size:12px;color:rgba(255,255,255,0.55);text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;transition:color 0.2s}
.nav-links a:hover{color:var(--yellow)}
.nav-hire{background:var(--yellow);color:var(--black);font-family:"Archivo Black",sans-serif;font-size:12px;letter-spacing:0.05em;text-transform:uppercase;padding:8px 18px;border-radius:100px;text-decoration:none;transition:transform 0.15s}
.nav-hire:hover{transform:scale(1.04)}

/* HERO GRID FIX */
.hero{min-height:auto;padding-top:52px;display:grid;grid-template-columns:1fr 1fr;position:relative;overflow:hidden}
.hero-left{background:var(--yellow);padding:4rem 3rem;display:flex;flex-direction:column;justify-content:flex-start;position:relative}

.hero-tag{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(0,0,0,0.45);margin-bottom:1.5rem;font-weight:500}
.hero-name{font-family:"Archivo Black",sans-serif;font-size:clamp(52px,7vw,88px);line-height:0.92;letter-spacing:-0.03em;color:var(--black);margin-bottom:1rem}
.hero-disclaimer{display:inline-block;background:var(--black);color:var(--yellow);font-size:12px;font-weight:600;letter-spacing:0.06em;padding:6px 14px;border-radius:100px;margin-bottom:2rem}
.hero-tagline{font-family:"Caveat",cursive;font-size:clamp(22px,3vw,30px);line-height:1.35;color:var(--black);max-width:400px;margin-bottom:2.5rem}
.hero-tagline strong{font-weight:700}
.hero-stats-row{display:flex;gap:1.5rem;flex-wrap:wrap}
.hst{background:var(--black);color:var(--yellow);border-radius:12px;padding:12px 18px}
.hst-num{font-family:"Archivo Black",sans-serif;font-size:22px;line-height:1}
.hst-label{font-size:11px;color:rgba(255,220,0,0.6);margin-top:2px}

/* MEME CARD STYLING */
.hero-meme-card {
  margin: 15px 0 25px 0;
  max-width: 350px; 
  border: 3px solid var(--black);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 6px 6px 0 var(--black);
  transform: rotate(-1.5deg);
  background: var(--black);
}
.hero-meme-img { width: 100%; height: auto; display: block; }

/* HERO RIGHT FIX */
.hero-right{background:var(--pink);display:flex;flex-direction:column;justify-content:flex-start;padding:2.5rem;position:relative;overflow:hidden;gap:1rem;max-height:850px}
.hero-sticker-1{display:inline-block;background:var(--yellow);color:var(--black);font-family:"Archivo Black",sans-serif;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;padding:8px 14px;border-radius:100px;transform:rotate(8deg);box-shadow:2px 3px 0 rgba(0,0,0,0.2);align-self:flex-end}
.hero-slides-stack{display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;scrollbar-width:none;max-height:650px}
.hero-canva-slide{border:3px solid white;border-radius:10px;overflow:hidden;box-shadow:3px 5px 20px rgba(0,0,0,0.2);background:rgba(255,255,255,0.15);position:relative;flex-shrink:0}
.hero-canva-slide img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover}

/* MARQUEE & REST */
.marquee-belt{background:var(--black);overflow:hidden;padding:13px 0;border-top:2px solid var(--yellow);border-bottom:2px solid var(--yellow)}
.marquee-inner{display:flex;white-space:nowrap;animation:mscroll 20s linear infinite}
.marquee-inner span{font-family:"Archivo Black",sans-serif;font-size:15px;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.4);padding:0 1.5rem;flex-shrink:0}
.marquee-inner span.acc{color:var(--yellow)}
@keyframes mscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.pov-block{background:var(--black);color:white;padding:80px 2.5rem}
.pov-inner{max-width:1140px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.pov-quote{font-family:"Caveat",cursive;font-size:clamp(28px,4vw,50px);line-height:1.3;color:var(--yellow)}
.pov-body{font-size:15px;line-height:1.85;color:rgba(255,255,255,0.5)}

.section{padding:80px 2.5rem;max-width:1140px;margin:0 auto}
.section-label{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;font-weight:600;color:var(--ink);opacity:0.5;margin-bottom:1.2rem}
.section-title{font-family:"Archivo Black",sans-serif;font-size:clamp(36px,6vw,68px);line-height:0.95;letter-spacing:-0.02em;margin-bottom:3rem}

.work-grid{display:flex;flex-direction:column;gap:2px}
.work-card{border-radius:14px;overflow:hidden;border:2px solid var(--black);transition:transform 0.2s;margin-bottom:2px}
.work-card-trigger{display:grid;grid-template-columns:60px 1fr auto;align-items:center;gap:1.5rem;padding:1.5rem 2rem;background:none;border:none;width:100%;text-align:left;cursor:pointer}
.work-card-num{font-family:"Archivo Black",sans-serif;font-size:42px;line-height:1;letter-spacing:-0.03em;color:rgba(0,0,0,0.1)}
.work-card-title{font-family:"Archivo Black",sans-serif;font-size:clamp(15px,2vw,20px);line-height:1.2;color:var(--black)}

.journey-bg{background:var(--black);padding:80px 0}
.journey-inner{max-width:1140px;margin:0 auto;padding:0 2.5rem}
.journey-title{font-family:"Archivo Black",sans-serif;font-size:clamp(36px,6vw,68px);line-height:0.95;letter-spacing:-0.02em;color:var(--white);margin-bottom:3rem}
.journey-card{background:#222;border-radius:14px;padding:1.75rem 2rem;display:grid;grid-template-columns:180px 1fr;gap:2rem;margin-bottom:10px}

.sq-section{padding:80px 2.5rem;max-width:1140px;margin:0 auto}
.sq-title{font-family:"Archivo Black",sans-serif;font-size:clamp(36px,6vw,68px);line-height:0.95;letter-spacing:-0.02em;margin-bottom:0.5rem}

.personality-inner{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:2.5rem}
.p-card{border-radius:16px;padding:1.5rem 1.25rem;border:2px solid rgba(0,0,0,0.06);background:var(--white)}

.contact-block{background:var(--yellow);padding:90px 2.5rem;text-align:center}
.contact-title{font-family:"Archivo Black",sans-serif;font-size:clamp(48px,9vw,110px);line-height:0.88;letter-spacing:-0.03em;color:var(--black)}

@media(max-width:768px){
  .hero{grid-template-columns:1fr}
  .hero-right{display:none}
  .personality-inner{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="cursor-dot" id="cursorDot"></div>

<nav>
  <div class="nav-logo">TJ<em>.</em></div>
  <ul class="nav-links">
    <li><a href="#work">Work</a></li>
    <li><a href="#journey">Journey</a></li>
    <li><a href="#sidequests">Sidequests</a></li>
    <li><a href="#contact">Say Hello</a></li>
  </ul>
  <a href="mailto:jaintanishq79@gmail.com" class="nav-hire">Hire Me</a>
</nav>

<div class="hero">
  <div class="hero-left">
    <p class="hero-tag">Brand Strategist · India · Open to work</p>
    
    <div class="hero-meme-card">
      <img src="D9C7FD7D-7FBB-486B-B3C0-EC34E215F68D.jpg" alt="Chak De India Meme" class="hero-meme-img">
    </div>

    <h1 class="hero-name">TANISHQ<br>JAIN.</h1>
    <div class="hero-disclaimer">✕ Not the jewellery brand</div>
    <p class="hero-tagline">I help brands figure out <strong>what they're actually selling</strong> — then help the world understand it.</p>
    
    <div class="hero-stats-row">
      <div class="hst"><div class="hst-num">18%</div><div class="hst-label">Order growth</div></div>
      <div class="hst"><div class="hst-num">4.3×</div><div class="hst-label">ROI</div></div>
      <div class="hst"><div class="hst-num">30K+</div><div class="hst-label">Farmers</div></div>
    </div>
  </div>

  <div class="hero-right">
    <div class="hero-sticker-1">Open to work ✦</div>
    <div class="hero-slides-stack">
      <div class="hero-canva-slide"><img src="intro-slide-1.jpg" alt="Slide 1"></div>
      <div class="hero-canva-slide"><img src="intro-slide-2.jpg" alt="Slide 2"></div>
      <div class="hero-canva-slide"><img src="intro-slide-3.jpg" alt="Slide 3"></div>
    </div>
  </div>
</div>

<script>
const dot = document.getElementById("cursorDot");
document.addEventListener("mousemove", e => {
  dot.style.left = e.clientX + "px";
  dot.style.top = e.clientY + "px";
});
</script>
</body>
</html>
